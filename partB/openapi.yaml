
openapi: 3.0.0
info:
  title: Library Lending API
  version: 1.0.0

servers:
  - url: http://localhost:3000

paths:
  /auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
      responses:
        "200":
          description: Success

  /books:
    get:
      summary: List books
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: OK

    post:
      summary: Create book
      responses:
        "201":
          description: Created

  /books/{id}:
    get:
      summary: Get single book
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
        "404":
          description: Not found

  /loans:
    post:
      summary: Borrow book
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Created
        "401":
          description: Unauthorized
        "409":
          description: Loan limit reached
        "422":
          description: Book unavailable

  /loans/{id}/renew:
    post:
      summary: Renew loan
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Renewed

  /loans/{id}/return:
    post:
      summary: Return book
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Returned

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

